<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
<title id="title">WEAPONIZED podcast visual identity</title>
<desc id="desc">An editorial graphic with a microphone waveform, document grid, United States Capitol silhouette and subtle unidentified aerial object motif. No portraits are depicted.</desc>
<defs>
 <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#04090d"/><stop offset=".52" stop-color="#07151a"/><stop offset="1" stop-color="#120708"/></linearGradient>
 <radialGradient id="glow" cx="82%" cy="24%" r="50%"><stop stop-color="#8e2528" stop-opacity=".52"/><stop offset="1" stop-color="#8e2528" stop-opacity="0"/></radialGradient>
 <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse"><path d="M52 0H0V52" fill="none" stroke="#9bd7ba" stroke-opacity=".055"/></pattern>
 <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
</defs>
<rect width="1600" height="520" fill="url(#bg)"/><rect width="1600" height="520" fill="url(#grid)"/><rect width="1600" height="520" fill="url(#glow)"/>
<!-- redacted document motif -->
<g opacity=".18" transform="translate(880 88) rotate(-5)"><rect width="390" height="260" rx="12" fill="#d7e4df"/><path d="M35 44h205M35 75h300M35 106h260M35 175h300M35 206h220" stroke="#26383a" stroke-width="10"/><path d="M150 99h180M34 137h250M175 199h170" stroke="#090b0c" stroke-width="17"/></g>
<!-- waveform and microphone -->
<g transform="translate(98 100)" fill="none" stroke="#df3c42" stroke-linecap="round"><path d="M0 155h70l18-28 22 58 25-92 28 124 28-78 22 36h85" stroke-width="8" opacity=".85"/><rect x="315" y="66" width="58" height="130" rx="29" stroke-width="9"/><path d="M294 150c0 58 101 58 101 0M344 208v47M304 256h80" stroke-width="9"/></g>
<!-- capitol silhouette, symbolic -->
<g transform="translate(1170 210)" fill="#dce9e4" opacity=".22"><path d="M105 0h90l-12 18h-66zM120 23h60v30h-60zM80 56h140l-18 18H98zM105 77h90v84h-90zM72 164h156v22H72zM43 190h214v28H43z"/><path d="M116 77v84M140 77v84M164 77v84M188 77v84" stroke="#071014" stroke-width="9"/></g>
<!-- subtle aerial object -->
<g transform="translate(1320 70)" opacity=".58"><ellipse cx="80" cy="28" rx="78" ry="18" fill="#cfe2dc"/><ellipse cx="80" cy="23" rx="38" ry="18" fill="#e7f2ee"/><path d="M28 43l-20 32h144l-20-32z" fill="#98c9ba" opacity=".18" filter="url(#soft)"/></g>
<!-- framing accents -->
<path d="M40 40h220M40 40v90M1560 480h-220M1560 480v-90" stroke="#9bd7ba" stroke-opacity=".3" stroke-width="2"/>
</svg>