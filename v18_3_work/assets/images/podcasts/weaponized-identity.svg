<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
<title id="title">WEAPONIZED podcast banner</title>
<desc id="desc">Original editorial banner with a desert night landscape, two anonymous host silhouettes, microphone, classified-document texture, and subtle UAP motif. The banner identifies the WEAPONIZED podcast hosted by Jeremy Corbell and George Knapp without depicting synthetic portraits.</desc>
<defs>
 <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#190d28"/><stop offset=".46" stop-color="#6d2630"/><stop offset="1" stop-color="#e36d32"/></linearGradient>
 <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#34110f"/><stop offset=".58" stop-color="#190c0b"/><stop offset="1" stop-color="#040608"/></linearGradient>
 <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0"><stop offset=".44" stop-color="#000" stop-opacity="0"/><stop offset=".67" stop-color="#030507" stop-opacity=".72"/><stop offset="1" stop-color="#030507"/></linearGradient>
 <radialGradient id="starGlow"><stop stop-color="#fff"/><stop offset=".15" stop-color="#ffd9aa"/><stop offset=".45" stop-color="#f58b4f" stop-opacity=".7"/><stop offset="1" stop-color="#f58b4f" stop-opacity="0"/></radialGradient>
 <pattern id="stars" width="95" height="78" patternUnits="userSpaceOnUse"><circle cx="11" cy="14" r="1" fill="#fff" opacity=".55"/><circle cx="66" cy="31" r="1.3" fill="#fff" opacity=".45"/><circle cx="43" cy="64" r=".8" fill="#fff" opacity=".4"/></pattern>
 <filter id="blur"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<rect width="1600" height="520" fill="url(#sky)"/><rect width="1600" height="330" fill="url(#stars)" opacity=".62"/>
<circle cx="325" cy="112" r="98" fill="url(#starGlow)"/><path d="M325 27v170M240 112h170" stroke="#fff4de" stroke-width="3" opacity=".8"/>
<!-- distant ridges -->
<path d="M0 290L120 205l92 56 100-117 110 117 89-75 111 96 115-88 128 95 100-57 111 64 110-85 134 72 100-63v180H0z" fill="#301114" opacity=".95"/>
<path d="M0 335l126-68 113 50 117-75 122 73 101-55 130 80 130-72 140 74 120-60 133 63 120-80 168 78v177H0z" fill="#170a0b"/>
<rect y="335" width="1600" height="185" fill="url(#ground)"/><path d="M0 430c260-42 420-18 630 7s390 16 970-25v108H0z" fill="#100708"/>
<!-- anonymous silhouettes, not portraits -->
<g fill="#050607" stroke="#42201e" stroke-width="3">
 <circle cx="292" cy="268" r="31"/><path d="M257 302c-18 28-28 70-25 145h112c4-72-7-118-23-145-17-11-47-12-64 0z"/><path d="M254 332l-48 82 18 10 50-66M323 331l38 83-18 9-45-68"/>
 <circle cx="405" cy="260" r="31"/><path d="M371 295c-18 28-28 76-24 152h112c4-75-7-123-24-151-17-11-47-12-64-1z"/><path d="M374 327l-42 71 18 11 45-61M435 326l42 73-17 11-47-63"/>
</g>
<!-- classified paper and microphone motif -->
<g transform="translate(1110 75) rotate(-4)" opacity=".22"><rect width="310" height="250" rx="8" fill="#d5c5b8"/><text x="155" y="42" text-anchor="middle" font-family="Arial" font-weight="800" font-size="26" fill="#7b1f1f">TOP SECRET</text><path d="M30 78h240M30 112h210M30 148h250M30 183h170M30 215h230" stroke="#171313" stroke-width="13"/></g>
<g transform="translate(1030 145)" fill="#08090a" stroke="#7d3b2b" stroke-width="4"><rect x="0" y="0" width="76" height="180" rx="38"/><path d="M-22 108c0 92 120 92 120 0M38 198v65M-10 265h96" fill="none" stroke="#d45b37" stroke-width="8"/></g>
<path d="M780 325h75l18-28 22 58 25-94 29 124 30-77 24 36h112" fill="none" stroke="#d9482f" stroke-width="6" opacity=".82"/>
<!-- subtle UAP -->
<g transform="translate(1435 70)" opacity=".78"><ellipse cx="64" cy="30" rx="62" ry="15" fill="#111821"/><ellipse cx="64" cy="24" rx="31" ry="15" fill="#303945"/><path d="M20 43L0 92h128l-20-49z" fill="#c8e7e8" opacity=".12" filter="url(#blur)"/></g>
<rect width="1600" height="520" fill="url(#fade)"/>
<!-- typography -->
<text x="800" y="190" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="126" letter-spacing="10" fill="#f5f3ef">WEAPONIZED</text>
<text x="800" y="242" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="24" letter-spacing="9" fill="#ef7d48">A PODCAST WITH</text>
<path d="M573 229h140M887 229h140" stroke="#ef7d48" stroke-width="3"/>
<text x="800" y="298" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="38" letter-spacing="7" fill="#fff">JEREMY CORBELL &amp; GEORGE KNAPP</text>
<g transform="translate(1160 392)" font-family="Arial,Helvetica,sans-serif"><text x="178" y="0" text-anchor="middle" font-weight="700" font-size="18" letter-spacing="4" fill="#f2f2ef">AVAILABLE ON</text><rect y="22" width="110" height="42" rx="9" fill="#17191c" stroke="#41464c"/><text x="55" y="49" text-anchor="middle" font-weight="700" font-size="18" fill="#fff">YouTube</text><rect x="122" y="22" width="100" height="42" rx="9" fill="#17191c" stroke="#41464c"/><circle cx="143" cy="43" r="11" fill="#1ed760"/><text x="178" y="49" font-weight="700" font-size="18" fill="#fff">Spotify</text><rect x="234" y="22" width="142" height="42" rx="9" fill="#17191c" stroke="#41464c"/><text x="305" y="49" text-anchor="middle" font-weight="700" font-size="18" fill="#fff">Apple Podcasts</text></g>
</svg>